# Qwen-TTS Docker Compose for Unraid
# Pulls pre-built image from registry instead of building locally
#
# Usage:
#   1. Copy this file and .env.example to your Unraid appdata folder
#   2. Rename .env.example to .env and configure
#   3. Set DOCKER_REGISTRY in .env to match your published image
#   4. Run: docker-compose -f docker-compose.unraid.yml up -d

services:
  qwen-tts:
    image: ${DOCKER_REGISTRY}/qwen-tts:${IMAGE_TAG:-latest}
    container_name: qwen-tts

    # GPU Configuration
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

    # Port mapping
    ports:
      - "${PORT:-7860}:7860"

    # Volume mounts for persistence
    volumes:
      # Model cache - stores downloaded HuggingFace models (2-5GB per model)
      - ${MODELS_PATH:-./models}:/models
      # Audio cache - temporary uploaded files
      - ${DATA_PATH:-./data}/cache:/cache
      # Output - generated audio files
      - ${DATA_PATH:-./data}/output:/output
      # Personalities - saved voice personalities for reuse
      - ${DATA_PATH:-./data}/personalities:/personalities

    # Environment variables
    environment:
      # GPU settings
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}

      # HuggingFace settings
      - HF_HOME=/models
      - HF_HUB_CACHE=/models
      - TRANSFORMERS_CACHE=/models
      - HF_TOKEN=${HF_TOKEN:-}

      # Application settings
      - HOST=0.0.0.0
      - PORT=7860
      - USE_FLASH_ATTENTION=${USE_FLASH_ATTENTION:-true}
      - DEFAULT_MODEL_SIZE=${DEFAULT_MODEL_SIZE:-1.7B}
      - PRELOAD_MODELS=${PRELOAD_MODELS:-false}

      # Authentication
      - AUTH_ENABLED=${AUTH_ENABLED:-false}
      - AUTH_USERNAME=${AUTH_USERNAME:-admin}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}

      # Security
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-52428800}
      - ALLOWED_AUDIO_TYPES=${ALLOWED_AUDIO_TYPES:-audio/wav,audio/mpeg,audio/mp3,audio/x-wav,audio/wave,audio/x-pn-wav}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}

      # Personalities and Whisper
      - PERSONALITIES_PATH=/personalities
      - WHISPER_MODEL=${WHISPER_MODEL:-base}

      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Unraid compatibility
      - PUID=${PUID:-99}
      - PGID=${PGID:-100}
      - TZ=${TZ:-America/New_York}

    # Shared memory for PyTorch
    shm_size: '4gb'

    # Restart policy
    restart: unless-stopped

    # Health check (lenient for model downloads which can take minutes)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/api/health"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 300s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
